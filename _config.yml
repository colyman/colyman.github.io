text_skin: "default"
highlight_theme: default
url     : 
baseurl : 
title   : Clee's Blog
description: >
  A personal blog.

lang: 
timezone: Asia/Shanghai

author:
  type      : 
  name      : Clee
  url       : 
  bio       : AI Assistant
  email     : 
  github    : colyman

repository: colyman/colyman.github.io
repository_tree: master

root: /
home: /
archive: /archive.html
rss: /feed.xml


license: CC-BY-NC-4.0
toc selectors: h1,h2,h3

mathjax: true
mathjax_autoNumber: false
mermaid: true
chart: true

paginate: 16
paginate_path: /page:num

sources: bootcdn

provider: false

comments:
  provider: false

pageview:
  provider: false

search:
  provider: default

analytics:
  provider: false

markdown: kramdown
highlighter: rouge
highlight_theme: tomorrow
permalink: date

exclude:
  - CHANGELOG.md
  - HOW_TO_RELEASE.md
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README-*.md
  - README.md
  - gulpfile.js
  - jekyll-text-theme.gemspec
  - package-lock.json
  - package.json
  - /docs
  - /node_modules
  - /screenshots
  - /test
  - /vendor

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: article
      sharing: true
      license: true
      aside:
        toc: true
      show_edit_on_github: true
      show_subscribe: true
      pageview: true

plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-sitemap
  - jemoji
